<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>평가 결과 관리자</title>
  <link rel="stylesheet" href="admin.css" />
  <style>
  /* ── 로그인 게이트 ── */
  .auth-gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #eef3f8;
  }

  .auth-card {
    width: 100%;
    max-width: 460px;
    background: #ffffff;
    border: 1px solid #d7e0ea;
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 10px 24px rgba(31, 79, 130, 0.08);
    text-align: center;
  }

  .auth-title {
    margin: 0 0 12px;
    font-size: 30px;
    font-weight: 800;
    color: #1f4f82;
  }

  .auth-desc {
    margin: 0 0 22px;
    color: #5b7187;
    line-height: 1.6;
  }

  .auth-login-btn {
    border: none;
    border-radius: 14px;
    background: #1f4f82;
    color: #ffffff;
    padding: 14px 18px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
  }

  .auth-login-btn:hover { background: #173b60; }

  .auth-message {
    margin: 18px 0 0;
    color: #a23b3b;
    font-size: 14px;
    min-height: 20px;
  }
  </style>
</head>
<body>

  <!-- 로그인 게이트 -->
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <h1 class="auth-title">평가 관리자 로그인</h1>
      <p class="auth-desc">허용된 관리자 계정으로 로그인해야 관리자 화면에 접근할 수 있습니다.</p>
      <button type="button" id="admin-login-btn" class="auth-login-btn">Google 계정으로 로그인</button>
      <p id="auth-message" class="auth-message"></p>
    </div>
  </div>

  <!-- 관리자 앱 -->
  <div id="admin-app" style="display: none;">
    <div class="admin-layout">

      <!-- 사이드바 -->
      <aside class="admin-sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-title">지휘관 평가<br>관리자</div>
        </div>

        <div class="sidebar-group">
          <div class="sidebar-group-label">과정</div>
          <nav class="sidebar-course-nav">
            <button type="button" class="sidebar-course-btn active"
              data-course="초급" data-page="pages/admin-beginner.html">
              초급과정
            </button>
            <button type="button" class="sidebar-course-btn"
              data-course="중급" data-page="pages/admin-intermediate.html">
              중급과정
            </button>
            <button type="button" class="sidebar-course-btn"
              data-course="고급" data-page="pages/admin-advanced.html">
              고급과정
            </button>
          </nav>
        </div>

        <div class="sidebar-group sidebar-menu-group">
          <div class="sidebar-group-label">메뉴</div>
          <nav class="sidebar-section-nav" id="sidebar-section-nav">
            <!-- JS로 동적 렌더링 -->
          </nav>
        </div>

        <div class="sidebar-group">
          <div class="sidebar-group-label">분석</div>
          <nav>
            <button type="button" class="sidebar-section-btn" id="sidebar-analysis-btn">📊 평가분석</button>
          </nav>
        </div>

      <div class="sidebar-footer">
          <div class="sidebar-user-email" id="admin-user-email"></div>
          <button type="button" id="admin-logout-btn" class="sidebar-logout-btn">로그아웃</button>
        </div>
      </aside>

      <!-- 메인 영역 -->
      <div class="admin-main">
        <header class="admin-topbar">
          <div class="admin-topbar-breadcrumb">
            <span id="topbar-course" class="topbar-course">초급과정</span>
            <span class="topbar-sep">›</span>
            <span id="topbar-section" class="topbar-section">-</span>
          </div>
          <button type="button" id="global-refresh-btn" class="topbar-refresh-btn" title="데이터 새로고침">↺</button>
        </header>

        <main class="admin-content">
          <div id="course-content" class="course-content">
            <div class="loading-box">로그인 후 관리자 화면이 표시됩니다.</div>
          </div>
        </main>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="admin-auth.js"></script>
  <script type="module" src="admin-beginner.js"></script>
  <script type="module" src="admin-intermediate.js"></script>
  <script type="module" src="admin-analysis.js"></script>
  <script src="admin-main.js"></script>
</body>
</html>
