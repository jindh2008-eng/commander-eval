<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>평가 결과 관리자</title>
  <link rel="stylesheet" href="admin.css" />
  <style>
  .auth-gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #eef3f8;
  }

  .auth-card {
    width: 100%;
    max-width: 460px;
    background: #ffffff;
    border: 1px solid #d7e0ea;
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 10px 24px rgba(31, 79, 130, 0.08);
    text-align: center;
  }

  .auth-title {
    margin: 0 0 12px;
    font-size: 30px;
    font-weight: 800;
    color: #1f4f82;
  }

  .auth-desc {
    margin: 0 0 22px;
    color: #5b7187;
    line-height: 1.6;
  }

  .auth-login-btn {
    border: none;
    border-radius: 14px;
    background: #1f4f82;
    color: #ffffff;
    padding: 14px 18px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
  }

  .auth-login-btn:hover {
    background: #173b60;
  }

  .auth-message {
    margin: 18px 0 0;
    color: #a23b3b;
    font-size: 14px;
    min-height: 20px;
  }

  .admin-top-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .admin-user-box {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .admin-user-email {
    font-size: 14px;
    font-weight: 700;
    opacity: 0.95;
  }

  .admin-logout-btn {
    border: 1px solid rgba(255, 255, 255, 0.35);
    background: rgba(255, 255, 255, 0.14);
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
  }

  .admin-logout-btn:hover {
    background: rgba(255, 255, 255, 0.22);
  }
</style>
</head>
<body>
  <div id="auth-gate" class="auth-gate">
    <div class="auth-card">
      <h1 class="auth-title">평가 관리자 로그인</h1>
      <p class="auth-desc">
        허용된 관리자 계정으로 로그인해야 관리자 화면에 접근할 수 있습니다.
      </p>
      <button type="button" id="admin-login-btn" class="auth-login-btn">
        Google 계정으로 로그인
      </button>
      <p id="auth-message" class="auth-message"></p>
    </div>
  </div>

  <div id="admin-app" style="display: none;">
    <div class="admin-shell">
      <header class="admin-header">
        <div class="admin-header-inner">
          <div class="admin-top-row">
            <div>
              <h1 class="admin-title">평가 결과 관리자</h1>
              <p class="admin-subtitle">과정별 평가 결과 조회 및 관리</p>
            </div>

            <div class="admin-user-box">
              <div class="admin-user-email" id="admin-user-email"></div>
              <button type="button" id="admin-logout-btn" class="admin-logout-btn">
                로그아웃
              </button>
            </div>
          </div>
        </div>
      </header>

      <section class="course-tab-section">
        <div class="course-tabs" role="tablist" aria-label="과정 선택">
          <button
            type="button"
            class="course-tab active"
            data-page="pages/admin-beginner.html"
            data-course="초급"
            role="tab"
            aria-selected="true"
          >
            초급과정 관리자
          </button>

          <button
            type="button"
            class="course-tab"
            data-page="pages/admin-intermediate.html"
            data-course="중급"
            role="tab"
            aria-selected="false"
          >
            중급과정 관리자
          </button>

          <button
            type="button"
            class="course-tab"
            data-page="pages/admin-advanced.html"
            data-course="고급"
            role="tab"
            aria-selected="false"
          >
            고급과정 관리자
          </button>
        </div>
      </section>

      <main class="admin-content">
        <section class="content-frame">
          <div id="course-content" class="course-content">
            <div class="loading-box">로그인 후 관리자 화면이 표시됩니다.</div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="admin-auth.js"></script>
  <script type="module" src="admin-beginner.js"></script>
  <script type="module" src="admin-intermediate.js"></script>
  <script src="admin-main.js"></script>
</body>
