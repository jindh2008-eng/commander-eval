<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>평가 결과 비교</title>
  <link rel="stylesheet" href="review.css" />
</head>
<body>
  <div class="review-shell">
    <header class="review-header">
      <div class="review-header-inner">
        <h1 class="review-title">평가 결과 비교</h1>
        <p class="review-subtitle">
          토큰값을 입력하면 내 평가 결과와 전체 평가 분포를 비교할 수 있습니다.
        </p>
      </div>
    </header>

    <main class="review-main">
      <section class="token-search-card">
        <div class="token-search-row">
          <div class="field-block field-type">
            <label>조회대상</label>
            <div class="toggle-group">
              <button type="button" class="toggle-btn active" data-group="review-type" data-value="평가">평가</button>
              <button type="button" class="toggle-btn" data-group="review-type" data-value="연습">연습</button>
            </div>
          </div>

          <div class="field-block field-token">
            <label for="tokenInput">토큰값 입력</label>
            <input
              id="tokenInput"
              type="text"
              placeholder="예: ZVM4U86K"
              autocomplete="off"
              spellcheck="false"
            />
          </div>

          <div class="field-block field-button">
            <button id="searchBtn" type="button">조회</button>
          </div>
        </div>

        <div id="messageBox" class="message-box info">
          조회대상을 선택하고 토큰값을 입력한 뒤 조회 버튼을 누르세요.
        </div>
      </section>

      <section id="summarySection" class="summary-section hidden">
        <div class="summary-top">
          <div class="summary-card">
            <div class="summary-label">과정명</div>
            <div id="summaryCourse" class="summary-value">-</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">회차</div>
            <div id="summaryRound" class="summary-value">-</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">내 총점</div>
            <div id="summaryMyScore" class="summary-value">-</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">전체 평균</div>
            <div id="summaryAvgScore" class="summary-value">-</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">내 위치</div>
            <div id="summaryRank" class="summary-value">-</div>
          </div>
        </div>

        <div class="chart-panel">
          <div class="chart-panel-header">
            <h2>전체 점수분포</h2>
            <p>전체 평가자 분포 속에서 내 점수 위치를 함께 표시합니다.</p>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="scoreHistogram"></canvas>
          </div>
        </div>
      </section>

      <section id="itemsSection" class="items-section hidden">
        <div class="section-heading">
          <h2>항목별 내 평가와 전체 비교</h2>
          <p>
            평가표 순서대로 내 평가값과 전체 상·중·하 분포를 함께 확인할 수 있습니다.
          </p>
        </div>

        <div id="itemsContainer" class="items-container"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="review.js"></script>
</body>
</html>
